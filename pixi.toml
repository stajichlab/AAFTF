[workspace]
authors = ["Jason Stajich <jasonstajich.phd@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "AAFTF"
platforms = ["linux-64"]
version = "0.6.2"

[tasks]

[dependencies]
python = "3.10.*"
samtools = ">=1.23,<2"
